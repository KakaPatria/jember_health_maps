name: jember_health_maps
description: "Jember Health Maps - Aplikasi Peta Fasilitas Kesehatan Kabupaten Jember"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  geolocator: ^13.0.2
  http: ^1.4.0
  provider: ^6.1.5
  path: ^1.9.0
  sqflite_common_ffi: ^2.4.2
  sqlite3_flutter_libs: ^0.6.0+eol
  sqflite_common_ffi_web: ^1.1.2
  image_picker: ^1.2.2
  url_launcher: ^6.3.2
  sensors_plus: ^7.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/data/faskes.json
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/app_icon.png"
  android_12:
    color: "#ffffff"
    image: "assets/images/app_icon.png"
