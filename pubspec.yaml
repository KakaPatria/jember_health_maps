name: jember_health_maps
description: "Jember Health Maps - Aplikasi Peta Fasilitas Kesehatan Kabupaten Jember"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  geolocator: ^13.0.2
  http: ^1.4.0
  provider: ^6.1.5
  path: ^1.9.0
  sqflite_common_ffi: ^2.4.2
  sqlite3_flutter_libs: ^0.6.0+eol
  sqflite_common_ffi_web: ^1.1.2
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/faskes.json
